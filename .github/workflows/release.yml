name: Electron Release

on:
  push:
    tags:
      - "v*"


permissions:
  contents: write


jobs:

  build:

    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest


    runs-on: ${{ matrix.os }}


    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20


      - name: Install dependencies
        run: npm install


      - name: Build React
        run: |
          cd frontend
          npm install
          npm run build


      - name: Build Electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build